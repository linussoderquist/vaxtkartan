<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digital flora – Naturvärdesarter i 3D</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="site-bg">
    <div class="site-content">
      <section id="gallery-page">
        <header class="wrap topbar">
          <button class="brand" type="button" onclick="showGallery()">
            <span class="brand-mark">♧</span>
            <span>
              <span class="brand-title">Digital flora</span>
              <span class="brand-sub">Naturvärdesarter i 3D</span>
            </span>
          </button>
          <nav class="nav">
            <a class="active" href="#gallery-page">Svenska skogliga naturvårdsarter</a>
            <a href="#om-projektet">Om sidan</a>
            <span class="info-dot">i</span>
          </nav>
        </header>

        <main class="wrap gallery-hero">
          <h1>Artgalleri</h1>
          <div class="search-row">
            <div class="search-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="m16.5 16.5 4 4"></path></svg>
              <input id="search" class="search-input" placeholder="Sök på svenskt eller vetenskapligt namn…" oninput="renderGallery()" />
            </div>
            <div>
              <div id="filters" class="filters"></div>
              <div class="landing-value-filter" aria-label="Filtrera på signalvärde">
                <span class="landing-value-filter-label">Signalvärde</span>
                <div class="mini-pyramid-filter">
                  <button type="button" class="mini-top" data-signal-filter="3" onclick="setSignalFilter(3)" title="Högsta signalvärde"></button>
                  <button type="button" class="mini-mid" data-signal-filter="2" onclick="setSignalFilter(2)" title="Mellan signalvärde"></button>
                  <button type="button" class="mini-base" data-signal-filter="1" onclick="setSignalFilter(1)" title="Lägsta signalvärde"></button>
                </div>
                <button type="button" id="signal-reset" class="value-reset active" onclick="setSignalFilter(null)">Alla</button>
              </div>
            </div>
          </div>
          <button id="clear-filters" class="clear-btn" type="button" onclick="clearFilters()" hidden>Rensa filter ↻</button>
          <p id="count" class="gallery-count"></p>
          <div id="gallery" class="gallery"></div>
          <div id="empty" class="empty" hidden>Inga arter matchade sökningen.</div>
        </main>

        <section id="om-projektet" class="wrap">
          <h2>Om sidan</h2>
          <p>En digital flora med interaktiva 3D-modeller.</p>
        </section>
      </section>

      <section id="species-page"></section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
