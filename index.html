<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digital flora – Signalarter i 3D</title>
  <style>
    :root{
      --ink:#102019;--muted:#647067;--forest:#10261d;--cream:#f6f4ed;--paper:#f8f7f1;
      --line:rgba(255,255,255,.24);--dark-line:rgba(16,32,25,.12);--shadow:0 24px 70px rgba(0,0,0,.22)
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--paper);color:var(--ink)}
    button,input{font:inherit} button{cursor:pointer} .wrap{width:min(1180px,calc(100% - 48px));margin:0 auto}
    .forest{min-height:720px;color:white;position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(5,18,13,.20),rgba(5,18,13,.82)),url("assets/scandinavian-wet-forest.jpg") center/cover no-repeat,linear-gradient(135deg,#14281e,#334736 45%,#08140f)}
    .forest:before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at top,rgba(255,255,255,.28),transparent 48%),linear-gradient(90deg,rgba(255,255,255,.05),transparent 18%,transparent 80%,rgba(255,255,255,.04));pointer-events:none}.forest>*{position:relative;z-index:1}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:24px;padding:26px 0 22px;border-bottom:1px solid rgba(255,255,255,.15)}
    .brand{display:flex;align-items:center;gap:13px;border:0;background:transparent;color:inherit;text-align:left;padding:0}.mark{width:42px;height:42px;border-radius:999px;display:grid;place-items:center;border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.1);backdrop-filter:blur(14px)}
    .brand-title{display:block;font-weight:760;font-size:1.05rem}.brand-sub{display:block;color:rgba(255,255,255,.74);font-size:.88rem;margin-top:2px}.nav{display:flex;gap:24px;align-items:center}.nav a,.nav button{border:0;background:transparent;color:rgba(255,255,255,.86);font-weight:650;text-decoration:none}.nav .active{color:white;border-bottom:2px solid white;padding-bottom:8px}.info-dot{width:28px;height:28px;border:1px solid rgba(255,255,255,.48);border-radius:999px;display:grid;place-items:center}
    .head{padding-top:54px;display:grid;grid-template-columns:430px 1fr;gap:36px;align-items:end}h1{font-family:Georgia,"Times New Roman",serif;font-weight:500;font-size:clamp(3.2rem,7vw,5.4rem);line-height:.96;letter-spacing:-.045em;margin:0}.search{position:relative;margin-top:22px}.search input{width:100%;border:1px solid rgba(255,255,255,.30);border-radius:999px;padding:15px 18px 15px 48px;background:rgba(255,255,255,.13);color:white;outline:none;backdrop-filter:blur(18px);box-shadow:0 14px 30px rgba(0,0,0,.18)}.search input::placeholder{color:rgba(255,255,255,.78)}.search span{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.75)}
    .filters{display:flex;flex-wrap:wrap;gap:12px}.filter{border:1px solid rgba(255,255,255,.22);border-radius:999px;background:rgba(255,255,255,.15);color:white;padding:11px 19px;backdrop-filter:blur(18px);box-shadow:0 12px 28px rgba(0,0,0,.14)}.filter.active{background:rgba(255,255,255,.92);color:var(--ink)}.clear{margin-top:16px;border:0;background:transparent;color:white;font-weight:650}.count{color:rgba(255,255,255,.70);margin:30px 0 18px}
    .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;padding-bottom:54px}.card{overflow:hidden;border:1px solid rgba(255,255,255,.24);border-radius:16px;background:rgba(245,245,239,.90);color:var(--ink);text-align:left;box-shadow:var(--shadow);padding:0;transition:.2s}.card:hover{transform:translateY(-5px);border-color:rgba(255,255,255,.52)}.thumb{height:154px;overflow:hidden;background:linear-gradient(135deg,#dfeadd,#becbb8);position:relative}.thumb img{display:none;width:100%;height:100%;object-fit:cover;filter:saturate(.9) contrast(.98)}.thumb.loaded img{display:block}.thumb.loaded .fallback{display:none}.fallback{height:100%}.card-body{padding:16px}.card h3{font-size:1.36rem;letter-spacing:-.035em;margin:0}.latin{font-style:italic;color:#66736a;margin:4px 0 0}.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;align-items:center}.tag{border-radius:999px;padding:7px 11px;font-size:.78rem;font-weight:740;background:#e8ebe2;color:#425047}.tag.yellow{background:#f5d77a;color:#5c4210}.tag.green{background:#94e6bf;color:#123f31}.arrow{margin-left:auto;width:28px;height:28px;border-radius:999px;background:rgba(255,255,255,.6);display:grid;place-items:center}
    .illustration{height:100%;position:relative;overflow:hidden;background:linear-gradient(135deg,#f3ecc7,#dcecc9,#c8dfcf)}.illustration.tallticka{background:linear-gradient(135deg,#d9dfd6,#c5d7c7,#e6e1cc)}.guckusko-symbol,.tallticka-symbol{position:absolute;inset:0;display:grid;place-items:center}.guckusko-symbol:before{content:"";width:142px;height:142px;background:radial-gradient(circle at 50% 52%,#f8d83a 0 25%,transparent 26%),radial-gradient(ellipse at 32% 31%,rgba(94,43,22,.78) 0 22%,transparent 23%),radial-gradient(ellipse at 68% 31%,rgba(94,43,22,.78) 0 22%,transparent 23%),linear-gradient(90deg,transparent 48%,rgba(44,122,83,.62) 49% 52%,transparent 53%)}.tallticka-symbol:before{content:"";width:156px;height:156px;background:radial-gradient(ellipse at 43% 45%,rgba(91,88,82,.95) 0 24%,transparent 25%),radial-gradient(ellipse at 44% 56%,rgba(50,47,43,.88) 0 17%,transparent 18%),linear-gradient(90deg,transparent 50%,rgba(70,76,66,.54) 51% 70%,transparent 71%)}.empty{border:1px solid rgba(255,255,255,.25);border-radius:18px;background:rgba(255,255,255,.14);padding:28px;color:white;backdrop-filter:blur(14px);margin-bottom:54px}
    .about{padding:44px 0 60px;color:#4c5a51}.about h2{font-family:Georgia,"Times New Roman",serif;font-size:2.4rem;font-weight:500;margin:0 0 12px;color:#173527}.about p{max-width:760px;line-height:1.7}
    #species-page{display:none;min-height:100vh;background:var(--paper)}.species-layout{display:grid;grid-template-columns:420px 1fr;min-height:100vh}.species-info{padding:42px 40px 50px max(40px,calc((100vw - 1180px)/2));background:radial-gradient(circle at 20% 0%,rgba(171,207,162,.24),transparent 35%),linear-gradient(180deg,#f7f6f0,#eeeee8)}.back{border:0;background:transparent;color:#334238;padding:0;font-weight:650;margin-bottom:34px}.species-title{font-family:Georgia,"Times New Roman",serif;font-size:clamp(3rem,6vw,4.8rem);font-weight:500;line-height:.98;letter-spacing:-.045em;color:#173527;margin:0}.species-info .latin{font-size:1.35rem;margin-top:10px}.species-tags{display:flex;flex-wrap:wrap;gap:9px;margin:24px 0}.species-desc{color:#36443a;line-height:1.75}.facts{display:grid;gap:18px;margin:36px 0 34px}.fact{display:grid;grid-template-columns:34px 1fr;gap:14px;color:#405047}.fact-icon{width:30px;height:30px;border-radius:999px;display:grid;place-items:center;border:1px solid rgba(18,63,49,.22);color:#173527}.fact strong{display:block;color:#69746c;font-weight:650;margin-bottom:3px}
    .pyramid{width:min(260px,84%);display:grid;gap:9px;margin:0 auto;justify-items:center}.pyramid-part{height:56px;opacity:.38;background:#d7d8ce;clip-path:polygon(50% 0,100% 100%,0 100%)}.pyramid-part.top{width:86px;background:#174332}.pyramid-part.mid{width:166px;clip-path:polygon(25% 0,75% 0,100% 100%,0 100%);background:#aeb9ab}.pyramid-part.base{width:248px;clip-path:polygon(17% 0,83% 0,100% 100%,0 100%);background:#d8d3c9}.pyramid-part.active{opacity:1;background:#123f31;filter:drop-shadow(0 16px 26px rgba(18,63,49,.20));transform:scale(1.035)}.pyramid-note{text-align:center;color:#6a766d;font-size:.92rem;margin-top:14px}
    .species-visual{padding:42px max(40px,calc((100vw - 1180px)/2)) 42px 36px;background:linear-gradient(180deg,#f5f4ed,#f1f0ea)}.visual-card{border-radius:18px;background:#151715;border:1px solid rgba(15,31,25,.16);overflow:hidden;box-shadow:0 28px 80px rgba(15,31,25,.18);position:relative}.viewer-top{position:absolute;z-index:2;top:16px;left:16px;border-radius:999px;background:rgba(255,255,255,.92);color:#17251d;padding:9px 13px;font-size:.86rem;font-weight:800}.visual-card iframe{display:block;width:100%;height:min(64vh,680px);min-height:520px;border:0}.strip{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px;padding:12px;border-radius:18px;background:rgba(255,255,255,.58);border:1px solid var(--dark-line)}.mini{height:88px;border-radius:12px;overflow:hidden;background:#dfe8dc}.mini img{display:none;width:100%;height:100%;object-fit:cover}.mini.loaded img{display:block}.mini.loaded .illustration{display:none}.bottom{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:22px}.white-card{border:1px solid var(--dark-line);border-radius:22px;background:rgba(255,255,255,.76);padding:24px;box-shadow:0 16px 40px rgba(15,31,25,.12)}.white-card p{color:#4c5a51;line-height:1.65}.card-title{font-weight:830;margin-bottom:12px;color:#1a2b22}.map{height:180px;margin-top:18px;border-radius:18px;padding:16px;color:#607068;background:radial-gradient(circle at 45% 40%,rgba(18,63,49,.30),transparent 9%),radial-gradient(circle at 52% 58%,rgba(18,63,49,.22),transparent 11%),linear-gradient(135deg,rgba(255,255,255,.8),rgba(225,228,216,.8));border:1px solid var(--dark-line)}.look{display:grid;gap:10px;padding:0;margin:0;list-style:none}.look li{display:flex;gap:10px;color:#4c5a51;line-height:1.45}.dot{width:8px;height:8px;border-radius:50%;margin-top:8px;background:#8ee4bb;flex:0 0 auto}.dot.yellow{background:#f5d77a}
    @media(max-width:1050px){.head,.species-layout{grid-template-columns:1fr}.gallery{grid-template-columns:repeat(2,1fr)}.species-info,.species-visual{padding:36px 24px}.bottom{grid-template-columns:1fr}.visual-card iframe{height:560px;min-height:440px}}@media(max-width:680px){.wrap{width:calc(100% - 30px)}.nav{display:none}.gallery{grid-template-columns:1fr}.filters{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}.filter{white-space:nowrap}.visual-card iframe{height:480px;min-height:420px}}
  </style>
</head>
<body>
  <section id="gallery-page">
    <div class="forest">
      <header class="wrap topbar">
        <button class="brand" type="button" onclick="goGallery()"><span class="mark">♧</span><span><span class="brand-title">Digital flora</span><span class="brand-sub">Signalarter i 3D</span></span></button>
        <nav class="nav"><a class="active" href="#gallery-page">Artgalleri</a><a href="#om-projektet">Om projektet</a><span class="info-dot">i</span></nav>
      </header>
      <section class="wrap head">
        <div><h1>Artgalleri</h1><div class="search"><span>⌕</span><input id="search" placeholder="Sök på svenskt eller vetenskapligt namn…" oninput="renderGallery()"></div></div>
        <div><div id="filters" class="filters"></div><button id="clear" class="clear" onclick="clearFilters()" hidden>Rensa filter ↻</button></div>
      </section>
      <section class="wrap"><p id="count" class="count"></p><div id="gallery" class="gallery"></div><div id="empty" class="empty" hidden>Inga arter matchade sökningen.</div></section>
    </div>
    <section id="om-projektet" class="wrap about"><h2>Om projektet</h2><p>En digital flora där klassisk artkunskap kombineras med interaktiva 3D-modeller. Galleriet använder lätta artbilder, medan artsidorna visar inbäddade gaussian splats.</p></section>
  </section>
  <section id="species-page"></section>

<script>
const species=[
{id:'guckusko',name:'Guckusko',latin:'Cypripedium calceolus',group:'Växter',subgroup:'Orkidé',family:'Orchidaceae',flowering:'Juni – juli',status:'Fridlyst i hela Sverige',signalLevel:3,flags:['Växter','Orkidéer','Fridlyst','Signalart'],habitat:'Äldre, fuktiga skogar med kalkrik mark',distribution:'Förekommer spritt i Sverige, främst där marken är kalkrik. Arten är lokalt sällsynt och ofta knuten till äldre, halvöppna skogsmiljöer.',description:'Guckuskon är en av våra mest karismatiska orkidéer. Den stora gula läppen fungerar som en tillfällig fälla för insekter, som leds ut förbi pollinierna och därmed hjälper till med pollineringen.',ecology:'Arten är beroende av rätt markkemi, fungerande mykorrhizasvampar och stabila växtplatser.',lookFor:['Stor gul toffelformad blomläpp','Brunröda kalkblad','Breda veckade blad','Ofta i kalkpåverkad skog'],viewerUrl:'https://superspl.at/s?id=b46fcc5b',accent:'yellow',illustrationClass:'guckusko'},
{id:'tallticka',name:'Tallticka',latin:'Porodaedalea pini',group:'Svampar',subgroup:'Ticka',family:'Hymenochaetaceae',flowering:'Flerårig fruktkropp',status:'Signalart',signalLevel:1,flags:['Svampar','Signalart','Tall','Vedlevande'],habitat:'Gamla levande tallar, ofta i äldre tallskogar',distribution:'Finns främst i landskap där det fortfarande finns gamla tallar. Den är vanligast i äldre barrskogsmiljöer men saknas i många brukade bestånd.',description:'Talltickan är en flerårig ticka som växer på levande tallar. Den är ofta diskret men viktig eftersom den berättar något om skogens ålder, kontinuitet och förekomsten av gamla träd.',ecology:'Svampen orsakar kärnröta i tall och skapar livsmiljöer för andra arter.',lookFor:['Hård hovformad fruktkropp','Växer på levande tall','Ofta högt upp på stammen','Kopplad till gamla tallar'],viewerUrl:'https://superspl.at/s?id=22d49954',accent:'green',illustrationClass:'tallticka'}
];
const allFlags=['Alla','Växter','Svampar','Orkidéer','Fridlyst','Signalart','Tall','Vedlevande'];
const selectedFlags=new Set(['Alla']);
console.assert(species.length>=2,'Minst två arter ska finnas.');
console.assert(species.every(s=>s.viewerUrl&&s.latin&&s.signalLevel),'Alla arter ska ha viewerUrl, latin och signalLevel.');
function esc(v){return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function renderFilters(){document.getElementById('filters').innerHTML=allFlags.map(f=>`<button class="filter ${selectedFlags.has(f)?'active':''}" onclick="toggleFlag('${esc(f)}')">${esc(f)}</button>`).join('');document.getElementById('clear').hidden=selectedFlags.has('Alla')&&selectedFlags.size===1}
function toggleFlag(f){if(f==='Alla'){selectedFlags.clear();selectedFlags.add('Alla')}else{selectedFlags.delete('Alla');selectedFlags.has(f)?selectedFlags.delete(f):selectedFlags.add(f);if(selectedFlags.size===0)selectedFlags.add('Alla')}renderFilters();renderGallery()}
function clearFilters(){selectedFlags.clear();selectedFlags.add('Alla');renderFilters();renderGallery()}
function matches(item,q){const txt=`${item.name} ${item.latin} ${item.group} ${item.subgroup} ${item.status} ${item.flags.join(' ')}`.toLowerCase();const active=[...selectedFlags].filter(f=>f!=='Alla');return(!q||txt.includes(q))&&(active.length===0||active.every(f=>item.flags.includes(f)))}
function renderGallery(){const q=document.getElementById('search').value.trim().toLowerCase();const filtered=species.filter(i=>matches(i,q));document.getElementById('count').textContent=`${filtered.length} av ${species.length} arter visas`;document.getElementById('empty').hidden=filtered.length!==0;document.getElementById('gallery').innerHTML=filtered.map(item=>`<button class="card" onclick="openSpecies('${item.id}')">${galleryPreview(item)}<div class="card-body"><h3>${esc(item.name)}</h3><p class="latin">${esc(item.latin)}</p><div class="tags"><span class="tag ${item.accent}">${esc(item.subgroup)}</span><span class="tag">${esc(item.status.split(' i ')[0])}</span><span class="arrow">→</span></div></div></button>`).join('');loadGalleryPhotos(filtered)}
function galleryPreview(item){return `<div class="thumb" data-photo-for="${esc(item.id)}"><img alt="${esc(item.name)}" loading="lazy"><div class="fallback">${illustration(item)}</div></div>`}
function illustration(item){const symbol=item.id==='guckusko'?'guckusko-symbol':'tallticka-symbol';return `<div class="illustration ${item.illustrationClass}"><div class="${symbol}"></div></div>`}
async function fetchINatPhotos(item,n=1){const key=`inat-photos:${item.latin}:${n}`;const cached=localStorage.getItem(key);if(cached){try{return JSON.parse(cached)}catch(e){}}try{const tax=await fetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(item.latin)}&rank=species&per_page=5`).then(r=>r.json());const exact=(tax.results||[]).find(t=>String(t.name).toLowerCase()===item.latin.toLowerCase())||(tax.results||[])[0];if(!exact)return[];const obs=await fetch(`https://api.inaturalist.org/v1/observations?taxon_id=${exact.id}&photos=true&quality_grade=research&per_page=${Math.max(n,3)}&order_by=votes`).then(r=>r.json());let urls=[];(obs.results||[]).forEach(o=>(o.photos||[]).forEach(p=>{if(p.url)urls.push(p.url.replace('square','medium'))}));if(urls.length===0&&exact.default_photo)urls=[exact.default_photo.medium_url||exact.default_photo.square_url||exact.default_photo.url];urls=[...new Set(urls)].slice(0,n);localStorage.setItem(key,JSON.stringify(urls));return urls}catch(e){console.warn('Kunde inte hämta iNaturalist-bilder',item.latin,e);return[]}}
async function loadGalleryPhotos(items){for(const item of items){const thumb=document.querySelector(`[data-photo-for="${CSS.escape(item.id)}"]`);if(!thumb||thumb.classList.contains('loaded'))continue;const img=thumb.querySelector('img');const photos=await fetchINatPhotos(item,1);if(photos[0]&&img){img.src=photos[0];img.onload=()=>thumb.classList.add('loaded')}}}
function pyramid(item){return `<div class="pyramid"><div class="pyramid-part top ${item.signalLevel===3?'active':''}"></div><div class="pyramid-part mid ${item.signalLevel===2?'active':''}"></div><div class="pyramid-part base ${item.signalLevel===1?'active':''}"></div></div><div class="pyramid-note">Utifrån Nitare, 2020.</div>`}
function speciesHtml(item){return `<div class="species-layout"><aside class="species-info"><button class="back" onclick="goGallery()">← Tillbaka till galleri</button><h1 class="species-title">${esc(item.name)}</h1><p class="latin">${esc(item.latin)}</p><div class="species-tags"><span class="tag ${item.accent}">${esc(item.subgroup)}</span><span class="tag">${esc(item.status.split(' i ')[0])}</span><span class="tag">${esc(item.group)}</span></div><p class="species-desc">${esc(item.description)} ${esc(item.ecology)}</p><div class="facts"><div class="fact"><span class="fact-icon">♧</span><div><strong>Grupp</strong>${esc(item.group)}</div></div><div class="fact"><span class="fact-icon">✽</span><div><strong>Familj</strong>${esc(item.family)}</div></div><div class="fact"><span class="fact-icon">☼</span><div><strong>Blomningstid</strong>${esc(item.flowering)}</div></div><div class="fact"><span class="fact-icon">♧</span><div><strong>Livsmiljö</strong>${esc(item.habitat)}</div></div><div class="fact"><span class="fact-icon">↓</span><div><strong>Status</strong>${esc(item.status)}</div></div></div>${pyramid(item)}</aside><main class="species-visual"><div class="visual-card"><div class="viewer-top">◈ 3D (Gaussian Splat)</div><iframe title="Interaktiv 3D-modell av ${esc(item.name)}" allow="fullscreen; xr-spatial-tracking" src="${esc(item.viewerUrl)}"></iframe></div><div class="strip">${[0,1,2].map(i=>`<div class="mini" data-mini="${i}"><img alt="${esc(item.name)} bild ${i+1}" loading="lazy">${illustration(item)}</div>`).join('')}</div><div class="bottom"><article class="white-card"><div class="card-title">Utbredning</div><p>${esc(item.distribution)}</p><div class="map">Här kan en fyndkarta eller Artportalen/GBIF-modul kopplas in senare.</div></article><article class="white-card"><div class="card-title">Kännetecken</div><ul class="look">${item.lookFor.map(p=>`<li><span class="dot ${item.accent==='yellow'?'yellow':''}"></span>${esc(p)}</li>`).join('')}</ul></article></div></main></div>`}
function openSpecies(id){if(location.hash!==`#${id}`)history.pushState({view:'species',id},'',`#${id}`);renderRoute()}
function goGallery(){if(location.hash)history.pushState({view:'gallery'},'',location.pathname);renderRoute()}
function renderRoute(){const id=location.hash.replace('#','');const item=species.find(s=>s.id===id);if(item){document.getElementById('gallery-page').style.display='none';const page=document.getElementById('species-page');page.style.display='block';page.innerHTML=speciesHtml(item);window.scrollTo({top:0,behavior:'instant'});loadSpeciesPhotos(item)}else{document.getElementById('gallery-page').style.display='block';const page=document.getElementById('species-page');page.style.display='none';page.innerHTML='';window.scrollTo({top:0,behavior:'instant'})}}
async function loadSpeciesPhotos(item){const photos=await fetchINatPhotos(item,3);document.querySelectorAll('[data-mini]').forEach((thumb,i)=>{const img=thumb.querySelector('img');if(photos[i]&&img){img.src=photos[i];img.onload=()=>thumb.classList.add('loaded')}})}
window.addEventListener('popstate',renderRoute);
renderFilters();renderGallery();history.replaceState({view:location.hash?'species':'gallery'},'',location.href);renderRoute();
</script>
</body>
</html>
